# PicoRouter Example Configuration
# Copy to picorouter.yaml and edit

profiles:
  chat:
    local:
      provider: ollama
      endpoint: http://localhost:11434
      models: [llama3]
    
    cloud:
      providers:
        kilo:
          models: [minimax/m2.5:free]
        openrouter:
          models: [openrouter/free]
    
    routing:
      - if: short_prompt
        use_local: true
      - if: contains_code
        use_local: true
        models: [codellama]
    
    yolo: false

  coding:
    local:
      provider: ollama
      endpoint: http://localhost:11434
      models: [codellama]
    cloud:
      providers:
        kilo:
          models: [minimax/m2.5:free]
    routing:
      - if: contains_code
        use_local: true

  yolo:
    local:
      provider: ollama
      endpoint: http://localhost:11434
      models: [llama3, codellama]
    cloud:
      providers:
        kilo:
          models: [minimax/m2.5:free, giga-potato]
        groq:
          models: [llama-3.1-70b-versatile]
        openrouter:
          models: [openrouter/free]
    yolo: true

# Default profile to use
default_profile: chat

# Server settings
server:
  host: 0.0.0.0
  port: 8080

