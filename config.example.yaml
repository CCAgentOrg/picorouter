# PicoRouter Example Configuration
# Copy to picorouter.yaml and edit

profiles:
  chat:
    local:
      provider: ollama
      endpoint: http://localhost:11434
      models: [llama3]
    
    cloud:
      providers:
        # Free / Low-cost
        kilo:
          models: [minimax/m2.5:free]
        groq:
          models: [llama-3.1-70b-versatile]
        
        # Major providers (add your API keys)
        # openai:
        #   models: [gpt-4o-mini, gpt-4o]
        # anthropic:
        #   models: [claude-3-haiku-20240307]
        # google:
        #   models: [gemini-1.5-flash]
        # mistral:
        #   models: [mistral-small-latest]
        # cohere:
        #   models: [command-r-plus]
        
        # Aggregators
        # together:
        #   models: [meta-llama/Llama-3-70b-chat-hf]
        # deepinfra:
        #   models: [meta-llama/Llama-3-70b-instruct]
    
    routing:
      - if: short_prompt
        use_local: true
      - if: contains_code
        use_local: true
        models: [codellama]
    
    yolo: false

  coding:
    local:
      provider: ollama
      endpoint: http://localhost:11434
      models: [codellama]
    cloud:
      providers:
        kilo:
          models: [minimax/m2.5:free]
    routing:
      - if: contains_code
        use_local: true

  yolo:
    local:
      provider: ollama
      endpoint: http://localhost:11434
      models: [llama3, codellama]
    cloud:
      providers:
        kilo:
          models: [minimax/m2.5:free]
        groq:
          models: [llama-3.1-70b-versatile]
        openrouter:
          models: [openrouter/free]
    yolo: true

# Default profile to use
default_profile: chat

# Server settings
server:
  host: 0.0.0.0
  port: 8080

# API Keys - set as environment variables:
# export KILO_API_KEY="sk-..."
# export GROQ_API_KEY="gsk_..."
# export OPENROUTER_API_KEY="sk-or-..."
# export OPENAI_API_KEY="sk-..."
# export ANTHROPIC_API_KEY="sk-ant-..."
# export GOOGLE_API_KEY="AIza..."
# export MISTRAL_API_KEY="..."
# export COHERE_API_KEY="..."
# export TOGETHER_API_KEY="..."
# export DEEPINFRA_API_KEY="..."
# export FIREWORKS_API_KEY="..."
# export ANYSCALE_API_KEY="..."
# export REPLICATE_API_KEY="r8_..."
# export AZURE_API_KEY="..."

# Or add directly (less secure):
