# PicoRouter Production Nginx Config
# Save to /etc/nginx/sites-available/picorouter

server {
    listen 443 ssl http2;
    server_name picorouter.yourdomain.com;

    # SSL certificates (replace with yours)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Basic auth (generate with: htpasswd -c /etc/nginx/.htpasswd user)
    auth_basic "PicoRouter";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name picorouter.yourdomain.com;
    return 301 https://$server_name$request_uri;
}
