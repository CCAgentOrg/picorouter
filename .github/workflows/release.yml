name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run tests
      run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            artifact_name: picorouter-linux-amd64
          - os: ubuntu-latest
            arch: aarch64
            artifact_name: picorouter-linux-arm64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Build binary
      run: |
        pyinstaller --onefile --name picorouter picorouter.py
    
    - name: Rename binary
      run: |
        mv dist/picorouter dist/${{ matrix.artifact_name }}
        chmod +x dist/${{ matrix.artifact_name }}
    
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.inputs.upload_url }}
        asset_path: dist/${{ matrix.artifact_name }}
        asset_name: ${{ matrix.artifact_name }}
        asset_content_type: application/octet-stream

  docker:
    runs-on: ubuntu-latest
    needs: [test, build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ccagentorg/picorouter:latest
          ccagentorg/picorouter:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [test, docker]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          picorouter-*
          picorouter-linux-*
        generate_release_notes: true
        name: PicoRouter ${{ github.ref_name }}
        body: |
          ## PicoRouter v${{ github.ref_name }}
          
          ### Installation
          
          **Binary:**
          ```bash
          # Linux x86_64
          curl -L -o picorouter https://github.com/CCAgentOrg/picorouter/releases/download/${{ github.ref_name }}/picorouter-linux-amd64
          chmod +x picorouter
          ./picorouter serve
          ```
          
          **Docker:**
          ```bash
          docker run -p 8080:8080 ccagentorg/picorouter:${{ github.ref_name }}
          ```
          
          **pip:**
          ```bash
          pip install picorouter
          ```
          
          ### Features
          - Local-first routing (Ollama, LM Studio)
          - 15+ cloud providers
          - Content-aware routing
          - Virtual providers
          - Multi-key auth
          - Storage backends
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build
      run: pip install build
    
    - name: Build package
      run: python -m build
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
