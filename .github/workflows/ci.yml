name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    
    - name: Install dependencies
      run: uv pip install --system -r requirements.txt
    
    - name: Run tests
      run: pytest tests/ -v --cov=picorouter --cov-report=term-missing --ignore=tests/test_integration.py
    
    - name: Check syntax
      run: python -m py_compile picorouter/__main__.py picorouter/*.py

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install flake8
      run: pip install flake8
    
    - name: Lint
      run: flake8 picorouter/ --max-line-length=100 --ignore=E501,W503 || true

  build-binary:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Build binary
      run: |
        pyinstaller --onefile --name picorouter \
          --add-data "picorouter:picorouter" \
          --hidden-import yaml \
          --hidden-import httpx \
          --hidden-import requests \
          picorouter.py
    
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: picorouter-binary
        path: dist/picorouter

  integration:
    runs-on: ubuntu-latest
    if: false  # Enable manually or on schedule
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Start Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 10
        ollama pull llama3
    
    - name: Run integration tests
      run: pytest tests/ -v -k "integration"
