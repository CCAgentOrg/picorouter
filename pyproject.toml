[project]
name = "picorouter"
version = "0.1.0"
description = "Your personal OpenRouter - lean, local-first AI model router"
authors = [{name = "CashlessConsumer"}]
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.uv]
dev-dependencies = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
